# Nginx config for the Yesterday frontend image.
# - Static SPA at /
# - /api/* proxied to the backend container on the docker-compose network
#   (service name `backend`, port 3001).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Standard hardening + perf knobs.
    server_tokens off;
    sendfile on;
    tcp_nopush on;

    # The Express backend caps inline xmlContent uploads at 5 MB; let a little
    # headroom through so the 413 comes from the app, not nginx.
    client_max_body_size 8m;

    # API proxy — Vite reads VITE_API_URL=/api at build time so the bundle
    # uses relative /api/... paths, which land here.
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Hashed Vite asset files — cache aggressively.
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback: client-side router owns everything else.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
