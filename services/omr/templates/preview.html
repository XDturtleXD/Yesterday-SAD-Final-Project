<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preview MusicXML</title>
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/opensheetmusicdisplay@1.8.9/build/opensheetmusicdisplay.min.js"></script>
</head>
<body>
  <main class="preview-shell">
    <header class="preview-header">
      <div>
        <p class="eyebrow">MusicXML Preview</p>
        <h1>Score Preview</h1>
        <p class="subtitle">
          Job ID: <code>{{ job_id }}</code>
          {% if engine_name %}
            · Engine: <code>{{ engine_name }}</code>
            · Page: <code>{{ page_number }}</code>
          {% endif %}
        </p>
      </div>
      <div class="preview-actions">
        <a class="secondary-button" href="/">Back</a>
        {% if engine_name %}
          <a class="primary-button" href="/result/{{ job_id }}/{{ engine_name }}/page/{{ page_number }}">Download</a>
        {% else %}
          <a class="primary-button" href="/result/{{ job_id }}/musicxml">Download</a>
        {% endif %}
      </div>
    </header>

    <section id="previewError" class="error-box hidden"></section>
    <section id="score" class="score-container"></section>
  </main>

  <script>
    window.JOB_ID = "{{ job_id }}";
    window.ENGINE_NAME = "{{ engine_name }}";
    window.PAGE_NUMBER = {{ page_number }};
  </script>
  <script src="/static/app.js"></script>
</body>
</html>
